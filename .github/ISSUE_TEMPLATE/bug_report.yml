name: Bug report
description: Report a bug in asc cli
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        This form is for reproducible bugs. If you need install help, auth setup help,
        workflow advice, or want to ask "how do I...?", please use GitHub Discussions:
        https://github.com/rudrankriyam/App-Store-Connect-CLI/discussions

        Please include enough detail for someone else to reproduce the issue.

  - type: input
    id: version
    attributes:
      label: asc version
      description: Paste the output of `asc version` (or `asc --version`)
      placeholder: "0.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      description: Your operating system (e.g. macOS 15.3, Ubuntu 24.04)
      placeholder: "macOS 15.3"
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: Install method
      options:
        - Homebrew
        - install.sh script
        - Built from source
        - Other (please specify in Additional context)
    validations:
      required: true

  - type: dropdown
    id: bypass_keychain
    attributes:
      label: Reproduces with ASC_BYPASS_KEYCHAIN=1
      description: Select Not applicable if the issue is unrelated to authentication or keychain access
      options:
        - "Yes"
        - "No"
        - "Not applicable"
    validations:
      required: true

  - type: dropdown
    id: api_debug
    attributes:
      label: Redacted ASC_DEBUG=api or --api-debug output included
      description: Select Not applicable if debug output would not help for this issue
      options:
        - "Yes"
        - "No"
        - "Not applicable"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command(s) you ran
      description: Paste the exact command(s), with any sensitive values removed
      render: shell
      placeholder: |
        asc apps list --paginate
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: "What happened instead?"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste stdout/stderr output. If safe, include redacted ASC_DEBUG=api or --api-debug output too.
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that helps (screenshots, repro repo, etc.)
